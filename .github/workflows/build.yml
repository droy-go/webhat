name: Build and Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.16.0'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Build Web Reader
  build-web-reader:
    name: Build Web Reader
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./reader

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./reader/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-reader
          path: ./reader/dist

  # Build Web Editor
  build-web-editor:
    name: Build Web Editor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./editor

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./editor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-editor
          path: ./editor/dist

  # Build Python Engine
  build-python-engine:
    name: Build Python Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel
          pip install -e .

      - name: Build package
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-engine
          path: ./engine/dist/

  # Build Flutter Android
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile/flutter_storypack

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./mobile/flutter_storypack/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: ./mobile/flutter_storypack/build/app/outputs/bundle/release/app-release.aab

  # Build Flutter iOS
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./mobile/flutter_storypack

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r webhat-ios.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ./mobile/flutter_storypack/webhat-ios.ipa

  # Build Flutter Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./mobile/flutter_storypack

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP
        run: |
          cd build/windows/x64/runner
          7z a -tzip ../../../../webhat-windows.zip Release

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ./mobile/flutter_storypack/webhat-windows.zip

  # Build Flutter macOS
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./mobile/flutter_storypack

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "WebHat StoryPack" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "webhat-macos.dmg" \
            "build/macos/Build/Products/Release/WebHat StoryPack.app"

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ./mobile/flutter_storypack/webhat-macos.dmg

  # Build Flutter Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile/flutter_storypack

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Create tarball
        run: |
          cd build/linux/x64/release
          tar -czf ../../../../webhat-linux.tar.gz bundle

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ./mobile/flutter_storypack/webhat-linux.tar.gz

  # Deploy to GitHub Pages
  deploy-web:
    name: Deploy to GitHub Pages
    needs: [build-web-reader, build-web-editor]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: false

    steps:
      - name: Download reader artifact
        uses: actions/download-artifact@v4
        with:
          name: web-reader
          path: ./_site/reader

      - name: Download editor artifact
        uses: actions/download-artifact@v4
        with:
          name: web-editor
          path: ./_site/editor

      - name: Create index
        run: |
          cat > ./_site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>WebHat StoryPack</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #1e1e2e 0%, #252542 100%);
                color: white;
              }
              h1 { color: #6366f1; margin-bottom: 2rem; }
              .links { display: flex; gap: 2rem; }
              a {
                padding: 1rem 2rem;
                background: #6366f1;
                color: white;
                text-decoration: none;
                border-radius: 8px;
                font-weight: 600;
                transition: background 0.2s;
              }
              a:hover { background: #4f46e5; }
            </style>
          </head>
          <body>
            <h1>WebHat StoryPack</h1>
            <div class="links">
              <a href="./reader/">Web Reader</a>
              <a href="./editor/">Web Editor</a>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Create Release
  release:
    name: Create Release
    needs:
      - build-web-reader
      - build-web-editor
      - build-python-engine
      - build-android
      - build-ios
      - build-windows
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
